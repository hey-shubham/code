<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMyShow</title>
    <link rel="stylesheet" href="./BookMyShow.css">
</head>
<body>
    <!-- Header -->
     <header>
        <div class="head">

            <!-- logo -->
            <div class="logo">
                <div class="left">
                    <h1>BookMyShow</h1>
                </div>
                <div class="right">
                    <button>Movies</button>
                    <button>Events</button>
                    <button>Sports</button>
                    <button>More</button>
                </div>
            </div>
            <!-- search -->
             <div class="search">
                <input type="text" class="searching" placeholder="search for movies,events or sports.....">
                <button>Search</button>
             </div>
        </div>

        <!-- main -->
        <main>
            <!-- hero section -->
             <div class="hero">
                <h2>Experience the Best Movies and Events</h2>
                <button>Book Now</button>
             </div>

             <div class="popular">
                <h2>Popular Movies</h2>
             </div>

             <div class="movies">
                <div class="card">
                    <img src="./card1.avif" alt="" class="images">
                    <h3>Mastii 4</h3>
                </div>
                <div class="card">
                    <img src="./card2.avif" alt="" class="images">
                    <h3>De De Pyaar De 2</h3>
                </div>
                <div class="card">
                    <img src="./card3.avif" alt="" class="images">
                    <h3>120 Bahadur</h3>
                </div>
                <div class="card">
                    <img src="./card4.avif" alt="" class="images">
                    <h3>Wicked: For Good</h3>
                </div>
                <div class="card">
                    <img src="./card5.avif" alt="" class="images">
                    <h3>Sisu: Road To Revenge</h3>
                </div>
                <div class="card">
                    <img src="./card6.avif" alt="" class="images">
                    <h3>Haq</h3>
                </div>
                <div class="card">
                    <img src="./card7.avif" alt="" class="images">
                    <h3>Now You See Me: Now You Don't</h3>
                </div>
                <div class="card">
                    <img src="./card8.avif" alt="" class="images">
                    <h3>Adventure of Jetcat 7D - Combo</h3>
                </div>
                <div class="card">
                    <img src="./card9.avif" alt="" class="images">
                    <h3>Adventure of Iceberg 7D - Combo</h3>
                </div>
                <div class="card">
                    <img src="./card10.avif" alt="" class="images">
                    <h3>Eko</h3>
                </div>
             </div>

             <div class="banner">
                <img src="./img11.avif" alt="">
             </div>
        </main>
     </header>
</body>
</html>
