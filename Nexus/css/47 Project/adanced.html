<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMyShow</title>
    <link rel="stylesheet" href="./advanced.css">
</head>
<body>
    <header>
        <div class="head">
             <!-- logo -->
            <div class="logo">
                <img src="./logo.png" alt="">
            </div>
            <!-- searching -->
             <div class="searching">
                <input type="text" class="search" placeholder="Search for Movies,Events,Plays,Sports and Activities">
             </div>
             <!-- signup -->
            <div class="signup">
                <button>signup</button>
            </div>
        </div>

        <div class="second">
            <!-- first -->
            <div class="left">
                <button>Movies</button>
                <button>Stream</button>
                <button>Events</button>
                <button>Plays</button>
                <button>Sports</button>
                <button>Activities</button>
            </div>
            <!-- second -->
            <div class="right">
                <button>ListYourShow</button>
                <button>Corporates</button>
                <button>Offers</button>
                <button>Gifts Cards</button>
            </div>
        </div>

        <div class="recommended">
            <h2>Recommended Movies</h2>
        </div>
        
        <div class="movies">
            <!-- recommended movies -->
                <div class="card">
                    <img src="./card1.avif" alt="" class="images images1">
                    <h3>Mastii 4</h3>
                </div>
                <div class="card">
                    <img src="./card2.avif" alt="" class="images">
                    <h3>De De Pyaar De 2</h3>
                </div>
                <div class="card">
                    <img src="./card3.avif" alt="" class="images">
                    <h3>120 Bahadur</h3>
                </div>
                <div class="card">
                    <img src="./card4.avif" alt="" class="images">
                    <h3>Wicked: For Good</h3>
                </div>
                <div class="card">
                    <img src="./card5.avif" alt="" class="images">
                    <h3>Sisu: Road To Revenge</h3>
                </div>
                <div class="card">
                    <img src="./card6.avif" alt="" class="images">
                    <h3>Haq</h3>
                </div>
                <div class="card">
                    <img src="./card7.avif" alt="" class="images">
                    <h3>Now You See Me: Now You Don't</h3>
                </div>
                <div class="card">
                    <img src="./card8.avif" alt="" class="images">
                    <h3>Adventure of Jetcat 7D - Combo</h3>
                </div>
                <div class="card">
                    <img src="./card9.avif" alt="" class="images">
                    <h3>Adventure of Iceberg 7D - Combo</h3>
                </div>
                <div class="card">
                    <img src="./card10.avif" alt="" class="images images10">
                    <h3>Eko</h3>
                </div>
             </div>

             <div class="banner">
                <img src="./img11.avif" alt="">
             </div>
        </div>
    </header>
</body>
</html>
