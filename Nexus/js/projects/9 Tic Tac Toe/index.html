<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- LEFT PLAYER -->
  <div class="player">
    <img src="./img1.png" id="xImg">
    <h2>X Player</h2>
  </div>

  <!-- CENTER GAME -->
  <div class="game-container">
    <h1>Tic Tac Toe</h1>

    <div class="board" id="board">
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
    </div>

    <button id="restartBtn">Restart Game</button>
    <h2 id="winnerText"></h2>
  </div>

  <!-- RIGHT PLAYER -->
  <div class="player">
    <img src="./img2.png" id="oImg">
    <h2>O Player</h2>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
