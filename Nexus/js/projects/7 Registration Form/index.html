<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="container">
        <h1>Student Registration form</h1>
        <form>
        <div class="first">
            <label for="name" class="firstName">User Name:</label><br>
            <input type="text" id="name" placeholder="Enter your Name" name="name"><br>

            <label for="lastname" class="lastName">Last Name:</label><br>
            <input type="text" id="lastname" placeholder="Enter your Last Name" name="lastname"><br>

            <label for="age" class="firstName">Age: </label><br>
            <input type="number" id="age" placeholder="Enter your age" name="age"><br> 
        </div>
            <button>Submit</button>
        </form> 
    </div>
<script src="./script.js"></script>
</body>
</html>
