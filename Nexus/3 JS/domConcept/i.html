<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sorry Riya</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      overflow:hidden;
    }

    #btn{
      padding:25px 60px;
      font-size:40px;
      border:none;
      border-radius:20px;
      background:red;
      color:white;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 0 20px rgba(255,0,0,0.5);
    }

    #btn:hover{
      transform:scale(1.1);
    }

    #message{
      margin-top:40px;
      text-align:center;
      color:white;
      opacity:0;
      transform:translateY(50px);
      transition:1s;
    }

    #message h1{
      font-size:55px;
      margin-bottom:15px;
      text-shadow:2px 2px 10px black;
    }

    #message p{
      font-size:35px;
      text-shadow:2px 2px 10px black;
    }

    .show{
      opacity:1 !important;
      transform:translateY(0px) !important;
      animation: glow 1s infinite alternate;
    }

    @keyframes glow{
      from{
        transform:scale(1);
      }

      to{
        transform:scale(1.05);
      }
    }

  </style>
</head>

<body>

  <button id="btn">Riya Bail Buddhi Click Karo</button>

  <div id="message">
    <h1>Riya Tum Bilkul Dimag se Paidal ho </h1>
    <p>Gadhi kahi ki</p>
    <p>Bail Buddhi</p>
  </div>

  <script>
    let btn = document.getElementById("btn");
    let message = document.getElementById("message");

    btn.addEventListener("click", function(){
      message.classList.add("show");
    });
  </script>

</body>
</html>
